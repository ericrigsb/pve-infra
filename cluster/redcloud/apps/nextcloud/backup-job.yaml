apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-backup
  namespace: nextcloud
  labels:
    app: nextcloud-backup
spec:
  schedule: "30 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
          - name: gitea-registry
          containers:
          - name: nextcloud-backup
            image: gitea.mesh.rigsb.net/eric/backup-runner:latest
            env:
            - name: RESTIC_CACHE_DIR
              value: "/tmp"
            - name: RESTIC_PASSWORD_FILE
              value: "/etc/restic-secret/password"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db
                  key: db-password
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              sleep 10

              echo "Testing kubectl get pods:"
              kubectl get pods -n nextcloud

              source /scripts/backup-service.sh
              
              # Create temp directory for database dumps
              mkdir -p /backup-temp
              
              # Nextcloud-specific pre/post backup functions
              nextcloud_pre_backup() {
                NEXTCLOUD_POD=$(kubectl get pods -n nextcloud \
                  -l app.kubernetes.io/name=nextcloud,app.kubernetes.io/component=app \
                  --field-selector=status.phase=Running \
                  -o jsonpath='{.items[0].metadata.name}')
                if [ -z "$NEXTCLOUD_POD" ]; then
                  NEXTCLOUD_POD=$(kubectl get pods -n nextcloud \
                    -l app.kubernetes.io/name=nextcloud,app.kubernetes.io/component=app \
                    -o jsonpath='{.items[0].metadata.name}')
                fi
                if [ -z "$NEXTCLOUD_POD" ]; then
                  echo "❌ Could not find a Nextcloud pod to exec into!"
                  kubectl get pods -n nextcloud --show-labels
                  return 1
                fi

                # Run occ as current user (should be www-data)
                output=$(kubectl exec -n nextcloud "$NEXTCLOUD_POD" -- bash -c "cd /var/www/html && php occ maintenance:mode --on" 2>&1)
                if echo "$output" | grep -q "already enabled"; then
                  echo "Nextcloud maintenance mode was already enabled"
                elif echo "$output" | grep -q "Maintenance mode enabled"; then
                  echo "Nextcloud maintenance mode enabled"
                else
                  echo "❌ Failed to enable Nextcloud maintenance mode"
                  echo "$output"
                  return 1
                fi
                sleep 10

                # Find the running PostgreSQL pod
                PG_POD=$(kubectl get pods -n postgresql -l app.kubernetes.io/name=postgresql --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
                if [ -z "$PG_POD" ]; then
                  PG_POD=$(kubectl get pods -n postgresql -o jsonpath='{.items[0].metadata.name}')
                fi
                if [ -z "$PG_POD" ]; then
                  echo "❌ Could not find a PostgreSQL pod to exec into!"
                  kubectl get pods -n postgresql --show-labels
                  return 1
                fi

                # Create database dump
                if kubectl exec -n postgresql "$PG_POD" -- env PGPASSWORD="$PGPASSWORD" pg_dump -U postgres nextcloud > /backup-temp/nextcloud-db-$(date +%Y%m%d-%H%M%S).sql; then
                  echo "Database dump created"
                else
                  echo "❌ Failed to create database dump"
                  return 1
                fi
              }
              
              nextcloud_post_backup() {
                NEXTCLOUD_POD=$(kubectl get pods -n nextcloud \
                  -l app.kubernetes.io/name=nextcloud,app.kubernetes.io/component=app \
                  --field-selector=status.phase=Running \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                if [ -z "$NEXTCLOUD_POD" ]; then
                  NEXTCLOUD_POD=$(kubectl get pods -n nextcloud \
                    -l app.kubernetes.io/name=nextcloud,app.kubernetes.io/component=app \
                    -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                fi
                if [ -z "$NEXTCLOUD_POD" ]; then
                  echo "❌ Could not find a Nextcloud pod to exec into!"
                  kubectl get pods -n nextcloud --show-labels
                  return 1
                fi

                # Try up to 3 times to disable maintenance mode
                for i in 1 2 3; do
                  if kubectl exec -n nextcloud "$NEXTCLOUD_POD" -- php occ maintenance:mode --off | grep -q "already disabled"; then
                    echo "Nextcloud maintenance mode was already disabled"
                    break
                  elif [ $? -eq 0 ]; then
                    echo "Nextcloud maintenance mode disabled"
                    break
                  else
                    echo "❌ Failed to disable Nextcloud maintenance mode, retrying ($i/3)..."
                    sleep 5
                  fi
                  if [ $i -eq 3 ]; then
                    echo "❌ Failed to disable Nextcloud maintenance mode after 3 attempts"
                    return 1
                  fi
                done

                rm -f /backup-temp/nextcloud-db-*.sql
              }

              backup_service "Nextcloud" "/backup/k8s-nextcloud" "/var/www/html/data /var/www/html/config/config.php /var/www/html/custom_apps /backup-temp" "nextcloud_pre_backup" "nextcloud_post_backup"
            volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html
              readOnly: true
            - name: restic-secret
              mountPath: /etc/restic-secret
              readOnly: true
            - name: backup-storage
              mountPath: /backup
            - name: backup-temp
              mountPath: /backup-temp
            - name: backup-scripts
              mountPath: /scripts
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 300m
                memory: 512Mi
          serviceAccountName: nextcloud-backup-sa
          securityContext:
            runAsUser: 33
            runAsGroup: 33
            fsGroup: 0
          volumes:
          - name: nextcloud-data
            persistentVolumeClaim:
              claimName: nextcloud-pvc
          - name: restic-secret
            secret:
              secretName: restic-secret
          - name: backup-storage
            nfs:
              server: 10.0.4.8
              path: /mnt/backup
          - name: backup-temp
            emptyDir: {}
          - name: backup-scripts
            configMap:
              name: backup-scripts
              defaultMode: 0755
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nextcloud-backup-sa
  namespace: nextcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nextcloud-backup-role
  namespace: nextcloud
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcloud-backup-binding
  namespace: nextcloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nextcloud-backup-role
subjects:
- kind: ServiceAccount
  name: nextcloud-backup-sa
  namespace: nextcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nextcloud-backup-cluster-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nextcloud-backup-cluster-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nextcloud-backup-cluster-role
subjects:
- kind: ServiceAccount
  name: nextcloud-backup-sa
  namespace: nextcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-secrets-reader
  namespace: nextcloud
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcloud-backup-secrets-binding
  namespace: nextcloud
subjects:
- kind: ServiceAccount
  name: nextcloud-backup-sa
  namespace: nextcloud
roleRef:
  kind: Role
  name: backup-secrets-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nextcloud-backup-pg-role
  namespace: postgresql
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcloud-backup-pg-binding
  namespace: postgresql
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nextcloud-backup-pg-role
subjects:
- kind: ServiceAccount
  name: nextcloud-backup-sa
  namespace: nextcloud